<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Teams — MFHFBs Projections</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  (function(){
    var t = localStorage.getItem('mfhfb_theme_v1') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
  :root{
    --bg:#101116; --surface:#191a21; --surface2:#212330; --border:#2b2d3a;
    --text:#e9e9ef; --muted:#8d8fa0; --accent:#6c63ff; --accent2:#4fc3f7;
    --good:#4caf81; --warn:#f5c842; --bad:#ff6584;
  }
  :root[data-theme="light"]{
    --bg:#f6f6f9; --surface:#ffffff; --surface2:#eef0f5; --border:#dfe1e8;
    --text:#15161b; --muted:#666a78; --accent:#5b52f0; --accent2:#0284c7;
    --good:#1f9d63; --warn:#a8710a; --bad:#d6304f;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; transition:background-color 0.15s, color 0.15s;}
  .wrap{max-width:1440px;margin:0 auto;padding:28px 20px 80px;}
  .topnav{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:22px; font-size:13px;}
  .topnav-links{display:flex; gap:14px;}
  .topnav a{color:var(--muted); text-decoration:none; padding:6px 0; border-bottom:2px solid transparent;}
  .topnav a.active{color:var(--text); border-color:var(--accent); font-weight:600;}
  .topnav a:hover{color:var(--text);}
  .theme-toggle{
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; padding:7px 12px;
    border-radius:20px; cursor:pointer;
  }
  .theme-toggle:hover{border-color:var(--accent); color:var(--accent2);}
  .hero{margin-bottom:22px;}
  .eyebrow{font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent2); margin-bottom:8px;}
  h1{font-family:'Playfair Display',serif; font-weight:800; font-size:32px; margin:0 0 6px; letter-spacing:-0.01em;}
  .sub{color:var(--muted); font-size:13.5px; line-height:1.5; max-width:720px;}

  .search-row{position:relative; margin-bottom:20px;}
  .search-row input{
    width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:14px; padding:11px 16px 11px 40px; border-radius:10px; outline:none;
  }
  .search-row input:focus{border-color:var(--accent);}
  .search-row svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted);}

  .empty-state{
    background:var(--surface); border:1px dashed var(--border); border-radius:14px;
    padding:32px; text-align:center; color:var(--muted); font-size:13.5px; line-height:1.7;
  }
  .empty-state code{background:var(--surface2); padding:2px 6px; border-radius:5px; font-family:'DM Mono',monospace; color:var(--accent2);}

  .team-block{background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:18px; overflow:hidden;}
  .team-header{
    padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;
    background:var(--surface2);
  }
  .team-name{font-family:'Playfair Display',serif; font-weight:800; font-size:17px;}
  .team-count{font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;}

  .team-cols{display:grid; grid-template-columns:1fr 1fr;}
  @media (max-width:900px){.team-cols{grid-template-columns:1fr;}}
  .col{overflow-x:auto;}
  .col + .col{border-left:1px solid var(--border);}
  @media (max-width:900px){.col + .col{border-left:none; border-top:1px solid var(--border);}}
  .col-title{
    padding:10px 14px; font-size:10.5px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--accent2); background:var(--bg); border-bottom:1px solid var(--border);
  }
  .col-title.right{color:var(--muted);}

  table.stat-table{width:100%; border-collapse:collapse; min-width:520px;}
  table.stat-table thead th{
    text-align:right; font-size:9.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
    color:var(--muted); padding:6px 8px; border-bottom:1px solid var(--border); white-space:nowrap;
  }
  table.stat-table thead th:first-child{text-align:left;}
  table.stat-table tbody td{
    padding:6px 8px; border-bottom:1px solid var(--border); text-align:right; font-size:11.5px;
    font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  table.stat-table tbody tr:last-child td{border-bottom:none;}
  table.stat-table tbody tr:hover{background:var(--surface2);}
  table.stat-table td.name-cell{text-align:left; font-weight:600; font-size:12px;}
  table.stat-table tr.unmatched td{opacity:0.5; font-style:italic;}
  .pause-tag{color:var(--bad); font-size:9px; font-weight:700; margin-left:5px;}
  .min-input{
    width:44px; background:var(--bg); border:1px solid var(--border); color:var(--accent2);
    font-family:'DM Mono',monospace; font-size:11.5px; text-align:right; border-radius:5px; padding:3px 5px; outline:none;
  }
  .min-input:focus{border-color:var(--accent);}
  .min-input.edited{border-color:var(--accent); color:var(--warn);}
  .reset-btn{background:none; border:none; color:var(--muted); font-size:11px; padding:0 2px; cursor:pointer;}
  .reset-btn:hover{color:var(--accent2);}
  .no-match-note{padding:10px 14px; font-size:11px; color:var(--muted); font-style:italic;}

  footer{margin-top:24px; font-size:11.5px; color:var(--muted); line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topnav">
    <div class="topnav-links">
      <a href="index.html">Projections</a>
      <a href="teams.html" class="active">NBA Teams</a>
    </div>
    <button class="theme-toggle" id="themeToggle"></button>
  </div>

  <div class="hero">
    <div class="eyebrow">MFHFB · Testseite</div>
    <h1>NBA Teams</h1>
    <p class="sub" id="heroSub">Pro Team zwei Spalten: links der aktuelle Kader mit deinen Minuten (editierbar, 9-Cat-Stats basierend auf letzter Saison), rechts zum Vergleich die tatsächliche End-Rotation der letzten Saison.</p>
  </div>

  <div class="search-row">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Team oder Spieler suchen…">
  </div>

  <div id="content"></div>

  <footer id="footerText"></footer>
</div>

<script src="players-data.js"></script>
<script>
  // rosters-data.js existiert erst, nachdem scripts/fetch-rosters.mjs
  // (manuell oder via GitHub Action) einmal gelaufen ist.
  window.addEventListener('error', function(){});
</script>
<script src="rosters-data.js" onerror="window.__rostersMissing = true"></script>
<script src="assets/shared.js"></script>
<script>
// ESPN- und BBM-Team-Kürzel weichen bei ein paar Teams voneinander ab.
const ESPN_TO_BBM_TEAM = {
  GS: 'GSW', NO: 'NOR', NY: 'NYK', PHX: 'PHO', SA: 'SAS', UTAH: 'UTA', WSH: 'WAS',
};
function toBbmAbbr(espnAbbr) { return ESPN_TO_BBM_TEAM[espnAbbr] || espnAbbr; }

mfhfbInitThemeToggle('themeToggle');
const nameIndex = mfhfbBuildNameIndex(PLAYER_RATES);
const NEWEST_LABEL = SEASON_LABELS[SEASON_LABELS.length - 1];
let query = '';

function fmt(v, d=1) { return v.toFixed(d); }

function statHeaderRow() {
  return `<tr><th>Spieler</th><th>Min</th><th>GP</th><th>PTS</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>3PM</th><th>FG%</th><th>FT%</th><th>TO</th></tr>`;
}

const HEAT_COLS = ['min', 'pts', 'reb', 'ast', 'stl', 'blk', 'fg3m', 'fgpct', 'ftpct', 'tov'];
const HEAT_INVERT = { tov: true };

function computeHeatRange(items, getVal) {
  const range = {};
  HEAT_COLS.forEach(col => {
    const vals = items.map(it => getVal(it, col)).filter(v => v !== null && !isNaN(v));
    range[col] = vals.length ? { min: Math.min(...vals), max: Math.max(...vals) } : { min: 0, max: 0 };
  });
  return range;
}
function heatFor(range, col, val) {
  return mfhfbHeatStyle(val, range[col].min, range[col].max, !!HEAT_INVERT[col]);
}

// Linke Spalte: aktueller (ESPN-)Kader, editierbare Minuten, Stats aus den
// Pro-Minute-Raten der letzten Saison hochgerechnet. Heatmap-Farben werden
// pro Team (also innerhalb dieser Liste) berechnet.
function renderLeftRows(rosterPlayers, weights, overrides) {
  if (!rosterPlayers.length) return `<tr><td colspan="11" class="no-match-note">Keine Spieler</td></tr>`;

  const items = rosterPlayers.map(rp => {
    const match = nameIndex.get(mfhfbNormalizeName(rp.name));
    if (!match) return { rp, match: null };
    const key = mfhfbNormalizeName(rp.name);
    const isEdited = overrides[key] !== undefined;
    const latest = mfhfbLatestSeason(match);
    const newestActual = mfhfbNewestSeasonActual(match);
    const minutes = isEdited ? overrides[key] : latest.mpg;
    const s = mfhfbComputeProjection(match, minutes, weights);
    return { rp, match, isEdited, latest, newestActual, minutes, s };
  });

  const range = computeHeatRange(items.filter(it => it.match), (it, col) => col === 'min' ? it.minutes : it.s[col]);

  return items.map(it => {
    if (!it.match) return `<tr class="unmatched"><td class="name-cell">${it.rp.name}</td><td colspan="10">keine Rate-Daten</td></tr>`;
    const { rp, match, isEdited, latest, newestActual, minutes, s } = it;
    return `<tr>
      <td class="name-cell">${match.name}${newestActual.missed ? `<span class="pause-tag">⚠ pausiert ${newestActual.label}</span>` : ''}</td>
      <td style="${heatFor(range,'min',minutes)}">
        <input class="min-input ${isEdited ? 'edited' : ''}" type="number" step="0.5" min="0" max="48"
          value="${fmt(minutes)}" data-name="${match.name.replace(/"/g,'&quot;')}" onchange="onMinutesChange(this)">
        ${isEdited ? `<button class="reset-btn" onclick="onReset('${match.name.replace(/'/g,"\\'")}')">↺</button>` : ''}
      </td>
      <td>${latest.gp}</td>
      <td style="${heatFor(range,'pts',s.pts)}">${fmt(s.pts)}</td>
      <td style="${heatFor(range,'reb',s.reb)}">${fmt(s.reb)}</td>
      <td style="${heatFor(range,'ast',s.ast)}">${fmt(s.ast)}</td>
      <td style="${heatFor(range,'stl',s.stl)}">${fmt(s.stl,1)}</td>
      <td style="${heatFor(range,'blk',s.blk)}">${fmt(s.blk,1)}</td>
      <td style="${heatFor(range,'fg3m',s.fg3m)}">${fmt(s.fg3m,1)}</td>
      <td style="${heatFor(range,'fgpct',s.fgpct)}">${fmt(s.fgpct)}%</td>
      <td style="${heatFor(range,'ftpct',s.ftpct)}">${fmt(s.ftpct)}%</td>
      <td style="${heatFor(range,'tov',s.tov)}">${fmt(s.tov,1)}</td>
    </tr>`;
  }).join('');
}

// Rechte Spalte: tatsächliche End-Rotation der letzten Saison für dieses
// Team (aus players-data.js gefiltert), reale Minuten/Stats, nicht editierbar.
function renderRightRows(bbmAbbr) {
  const players = PLAYER_RATES
    .filter(p => p.team === bbmAbbr)
    .map(p => {
      const latest = mfhfbLatestSeason(p);
      const r = latest.rates;
      return {
        p, latest,
        min: latest.mpg, gp: latest.gp,
        pts: r.pts * latest.mpg, reb: r.reb * latest.mpg, ast: r.ast * latest.mpg,
        stl: r.stl * latest.mpg, blk: r.blk * latest.mpg, fg3m: r.fg3m * latest.mpg,
        fgpct: (r.fgm / r.fga) * 100 || 0, ftpct: (r.ftm / r.fta) * 100 || 0, tov: r.tov * latest.mpg,
      };
    })
    .sort((a, b) => b.min - a.min);

  if (!players.length) return `<tr><td colspan="11" class="no-match-note">Keine Daten für ${bbmAbbr}</td></tr>`;

  const range = computeHeatRange(players, (it, col) => it[col]);

  return players.map(it => `<tr>
      <td class="name-cell">${it.p.name}</td>
      <td style="${heatFor(range,'min',it.min)}">${fmt(it.min)}</td>
      <td>${it.gp}</td>
      <td style="${heatFor(range,'pts',it.pts)}">${fmt(it.pts)}</td>
      <td style="${heatFor(range,'reb',it.reb)}">${fmt(it.reb)}</td>
      <td style="${heatFor(range,'ast',it.ast)}">${fmt(it.ast)}</td>
      <td style="${heatFor(range,'stl',it.stl)}">${fmt(it.stl,1)}</td>
      <td style="${heatFor(range,'blk',it.blk)}">${fmt(it.blk,1)}</td>
      <td style="${heatFor(range,'fg3m',it.fg3m)}">${fmt(it.fg3m,1)}</td>
      <td style="${heatFor(range,'fgpct',it.fgpct)}">${fmt(it.fgpct)}%</td>
      <td style="${heatFor(range,'ftpct',it.ftpct)}">${fmt(it.ftpct)}%</td>
      <td style="${heatFor(range,'tov',it.tov)}">${fmt(it.tov,1)}</td>
    </tr>`).join('');
}

function render() {
  const container = document.getElementById('content');

  if (typeof ROSTERS_DATA === 'undefined' || window.__rostersMissing) {
    container.innerHTML = `<div class="empty-state">
      Noch keine Roster-Daten geladen.<br><br>
      Einmal lokal ausführen: <code>node scripts/fetch-rosters.mjs</code><br>
      oder im Repo unter <b>Actions → Update NBA Rosters → Run workflow</b> manuell anstoßen.<br>
      Danach läuft es automatisch 1x täglich.
    </div>`;
    document.getElementById('footerText').textContent = 'Warte auf ersten Roster-Fetch von ESPN.';
    return;
  }

  const weights = mfhfbGetWeights();
  const overrides = mfhfbGetOverrides();
  const q = query.toLowerCase().trim();

  document.getElementById('footerText').textContent =
    `Roster-Stand: ${new Date(ROSTERS_DATA.fetchedAt).toLocaleString('de-DE')} · Quelle: ${ROSTERS_DATA.source} · ${ROSTERS_DATA.teamCount}/30 Teams geladen. Rechte Spalte = End-Rotation ${NEWEST_LABEL}.`;

  const teamEntries = Object.entries(ROSTERS_DATA.rosters).sort((a, b) => a[0].localeCompare(b[0]));

  const filtered = teamEntries.filter(([abbr, team]) => {
    if (!q) return true;
    if (team.name.toLowerCase().includes(q) || abbr.toLowerCase().includes(q)) return true;
    return team.players.some(p => p.name.toLowerCase().includes(q));
  });

  container.innerHTML = filtered.map(([abbr, team]) => {
    const bbmAbbr = toBbmAbbr(abbr);
    const leftPlayers = q
      ? team.players.filter(p => p.name.toLowerCase().includes(q) || team.name.toLowerCase().includes(q) || abbr.toLowerCase().includes(q))
      : team.players;

    return `<div class="team-block">
      <div class="team-header">
        <div class="team-name">${abbr} — ${team.name}</div>
        <div class="team-count">${team.players.length} Spieler (aktuell)</div>
      </div>
      <div class="team-cols">
        <div class="col">
          <div class="col-title">Aktueller Kader — meine Minuten</div>
          <table class="stat-table">
            <thead>${statHeaderRow()}</thead>
            <tbody>${renderLeftRows(leftPlayers, weights, overrides)}</tbody>
          </table>
        </div>
        <div class="col">
          <div class="col-title right">End-Rotation ${NEWEST_LABEL} (real)</div>
          <table class="stat-table">
            <thead>${statHeaderRow()}</thead>
            <tbody>${renderRightRows(bbmAbbr)}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('') || `<div class="empty-state">Keine Treffer.</div>`;
}

function onMinutesChange(input) {
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 0) return;
  mfhfbSetMinutes(input.dataset.name, val);
  render();
}

function onReset(name) {
  mfhfbResetMinutes(name);
  render();
}

document.getElementById('search').addEventListener('input', e => { query = e.target.value; render(); });

render();
</script>
</body>
</html>
