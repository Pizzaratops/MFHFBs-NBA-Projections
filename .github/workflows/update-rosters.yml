name: Update NBA Rosters

# Zieht 1x täglich die aktuellen Kader von ESPN und committet Änderungen
# automatisch zurück ins Repo. Kann außerdem manuell angestoßen werden
# (Actions-Tab -> "Update NBA Rosters" -> "Run workflow").

on:
  schedule:
    # 09:00 UTC = 10/11 Uhr MEZ/MESZ — nach den meisten US-Nachtmeldungen,
    # vor dem europäischen Vormittag. Bei Bedarf einfach die Uhrzeit anpassen.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-rosters:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Roster von ESPN ziehen
        run: node scripts/fetch-rosters.mjs

      - name: Änderungen committen, falls vorhanden
        run: |
          git config user.name "mfhfb-roster-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/rosters.json rosters-data.js
          if git diff --cached --quiet; then
            echo "Keine Roster-Änderungen heute."
          else
            git commit -m "Automatisches Roster-Update ($(date -u +%Y-%m-%d))"
            git push
          fi
